<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body{
text-align:center;
font-family:Arial;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
background:#eee;
font-size:40px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
transition:0.2s;
}

.cell:active{
transform:scale(0.9);
}

.cell.invalid{
animation:shake 0.3s;
background:#ffcccc;
}

@keyframes shake{
0%,100%{transform:translateX(0)}
25%{transform:translateX(-5px)}
75%{transform:translateX(5px)}
}

.win{
background:lightgreen;
}

.score{
margin-top:10px;
font-size:18px;
}

button{
margin-top:20px;
padding:10px 20px;
margin:5px;
}

.game-over-message{
margin-top:10px;
font-weight:bold;
color:#666;
}
</style>
</head>

<body>
<h2>Tic Tac Toe</h2>
<h3 id="status">Player X Turn</h3>

<div class="score">
X Score : <span id="xScore">0</span> |
O Score : <span id="oScore">0</span>
</div>

<div id="board" class="board"></div>

<div>
<button onclick="resetGame()">Reset Game</button>
<button onclick="newGame()">New Game</button>
</div>

<div id="gameOverMessage" class="game-over-message"></div>

<script>
let board = document.getElementById("board");
let statusText = document.getElementById("status");
let xScoreText = document.getElementById("xScore");
let oScoreText = document.getElementById("oScore");
let gameOverMessage = document.getElementById("gameOverMessage");

let cells = [];
let currentPlayer = "X";
let gameActive = true;
let xScore = 0;
let oScore = 0;

const winComb = [
[0,1,2], [3,4,5], [6,7,8], 
[0,3,6], [1,4,7], [2,5,8], 
[0,4,8], [2,4,6] 
];


function createBoard() {
board.innerHTML = '';
cells = [];
for(let i = 0; i < 9; i++) {
let cell = document.createElement('div');
cell.className = 'cell';
cell.dataset.index = i;
cell.addEventListener('click', () => cellClick(cell, i));
board.appendChild(cell);
cells.push(cell);
}
}

createBoard();

function cellClick(cell, index) {

if(!gameActive) {
showGameOverMessage("Game is over. Start a new game!");
return;
}

if(cell.textContent != "") {

cell.classList.add('invalid');
setTimeout(() => cell.classList.remove('invalid'), 300);
return;
}

cell.textContent = currentPlayer;

checkGameStatus();

if(gameActive) {
currentPlayer = currentPlayer === "X" ? "O" : "X";
statusText.textContent = "Player " + currentPlayer + " Turn";
}
}

function checkGameStatus() {
for(let comb of winComb) {
let a = cells[comb[0]].textContent;
let b = cells[comb[1]].textContent;
let c = cells[comb[2]].textContent;

if(a && a === b && b === c) {
cells[comb[0]].classList.add("win");
cells[comb[1]].classList.add("win");
cells[comb[2]].classList.add("win");

statusText.textContent = "Player " + a + " Wins!";
gameActive = false;
gameOverMessage.textContent = "Game Over - " + a + " wins!";
if(a === "X") {
xScore++;
xScoreText.textContent = xScore;
} else {
oScore++;
oScoreText.textContent = oScore;
}
return;
}
}
let draw = [...cells].every(cell => cell.textContent != "");
if(draw) {
statusText.textContent = "It's a Draw!";
gameActive = false;
gameOverMessage.textContent = "Game Over - It's a draw!";
}
}

function showGameOverMessage(msg) {
gameOverMessage.textContent = msg;
setTimeout(() => {
if(gameOverMessage.textContent === msg) {
gameOverMessage.textContent = "";
}
}, 1500);
}
function newGame() {
cells.forEach(cell => {
cell.textContent = "";
cell.classList.remove("win");
});
currentPlayer = "X";
gameActive = true;
statusText.textContent = "Player X Turn";
gameOverMessage.textContent = "";
}
function resetGame() {
newGame();
xScore = 0;
oScore = 0;
xScoreText.textContent = "0";
oScoreText.textContent = "0";
}
document.addEventListener('keydown', (e) => {
if(e.key === 'r' || e.key === 'R') {
resetGame();
}
});

</script>
</body>
</html>
