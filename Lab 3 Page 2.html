<!DOCTYPE html>
<html>
<head>
    <title>Validation 5-6-7</title>
    <style>
        .box {
            border: 1px solid black;
            padding: 15px;
            width: 350px;
            margin-bottom: 20px;
        }
        p {
            color: red;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>

<h2>Validation Form (5,6,7)</h2>

<!-- 5️⃣ DEGREE -->
<div class="box">
    <h3>Degree</h3>
    <form onsubmit="return validateDegree()">
        <input type="checkbox" name="degree" value="SSC"> SSC
        <input type="checkbox" name="degree" value="HSC"> HSC
        <input type="checkbox" name="degree" value="BSC"> BSC
        <br><br>
        <input type="submit" value="Submit">
    </form>
    <p id="degreeMsg"></p>
</div>

<!-- 6️⃣ BLOOD GROUP -->
<div class="box">
    <h3>Blood Group</h3>
    <form onsubmit="return validateBlood()">
        <select id="blood">
            <option value="">Select</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
        </select>
        <br><br>
        <input type="submit" value="Submit">
    </form>
    <p id="bloodMsg"></p>
</div>

<!-- 7️⃣ PROFILE PICTURE -->
<div class="box">
    <h3>Profile Picture</h3>
    <form onsubmit="return validateProfile()">
        User Id:
        <input type="text" id="userId">
        <br><br>
        Picture:
        <input type="file" id="picture">
        <br><br>
        <input type="submit" value="Submit">
    </form>
    <p id="profileMsg"></p>
</div>

<script>

function validateDegree() {
    var degrees = document.getElementsByName("degree");
    document.getElementById("degreeMsg").innerHTML = "";
    var selected = false;

    for (var i = 0; i < degrees.length; i++) {
        if (degrees[i].checked) {
            selected = true;
            break;
        }
    }

    if (!selected) {
        document.getElementById("degreeMsg").innerHTML = 
        "At least one degree must be selected";
        return false;
    }

    alert("Degree Selected!");
    return true;
}

function validateBlood() {
    var blood = document.getElementById("blood").value;
    document.getElementById("bloodMsg").innerHTML = "";

    if (blood === "") {
        document.getElementById("bloodMsg").innerHTML = 
        "Blood group must be selected";
        return false;
    }

    alert("Blood Group Selected!");
    return true;
}

function validateProfile() {
    var userId = document.getElementById("userId").value.trim();
    var picture = document.getElementById("picture").value;
    document.getElementById("profileMsg").innerHTML = "";

    if (userId === "") {
        document.getElementById("profileMsg").innerHTML = 
        "UserId cannot be empty";
        return false;
    }

    if (isNaN(userId) || parseInt(userId) <= 0) {
        document.getElementById("profileMsg").innerHTML = 
        "UserId must be a positive number";
        return false;
    }

    if (picture === "") {
        document.getElementById("profileMsg").innerHTML = 
        "Picture cannot be empty";
        return false;
    }

    alert("Profile Submitted Successfully!");
    return true;
}

</script>

</body>
</html>
